---
- name: "CONTROLLER | Gather Ansible version"
  ansible.builtin.command: ansible --version
  register: gather_diagnostics_controller_ansible_version
  changed_when: false
  ignore_errors: true

- name: "CONTROLLER | Gather SSH client version"
  ansible.builtin.command: ssh -V
  register: gather_diagnostics_controller_ssh_version
  changed_when: false
  ignore_errors: true

- name: "CONTROLLER | Gather Ansible config (all)"
  ansible.builtin.command: ansible-config dump
  register: gather_diagnostics_controller_ansible_config_dump
  changed_when: false
  ignore_errors: true

- name: "CONTROLLER | Gather Ansible config (only changed)"
  ansible.builtin.command: ansible-config dump --only-changed
  register: gather_diagnostics_controller_ansible_config_changed
  changed_when: false
  ignore_errors: true

- name: "CONTROLLER | Gather system locale"
  ansible.builtin.command: locale
  register: gather_diagnostics_controller_locale
  changed_when: false
  ignore_errors: true

- name: "CONTROLLER | List installed Ansible collections"
  ansible.builtin.command: ansible-galaxy collection list
  register: gather_diagnostics_controller_galaxy_list
  changed_when: false
  ignore_errors: true

- name: "CONTROLLER | Gather environment variables"
  ansible.builtin.command: env
  register: gather_diagnostics_controller_env
  changed_when: false
  ignore_errors: true
  no_log: "{{ not gather_diagnostics_save_controller_log }}"

- name: "CONTROLLER | Gather Ansible facts"
  ansible.builtin.setup:
  register: gather_diagnostics_controller_setup_facts
  ignore_errors: true

# --- DISPLAY CONTROLLER NODE RESULTS ---

- name: "CONTROLLER | Ansible Version"
  ansible.builtin.debug:
    var: gather_diagnostics_controller_ansible_version.stdout
  when: gather_diagnostics_controller_ansible_version.stdout is defined

- name: "CONTROLLER | SSH Version"
  ansible.builtin.debug:
    var: gather_diagnostics_controller_ssh_version.stderr
  when: gather_diagnostics_controller_ssh_version.stderr is defined

- name: "CONTROLLER | Ansible Config (all)"
  ansible.builtin.debug:
    var: gather_diagnostics_controller_ansible_config_dump.stdout_lines
  when: gather_diagnostics_controller_ansible_config_dump.stdout_lines is defined

- name: "CONTROLLER | Ansible Config (changed only)"
  ansible.builtin.debug:
    var: gather_diagnostics_controller_ansible_config_changed.stdout_lines
  when: gather_diagnostics_controller_ansible_config_changed.stdout_lines is defined

- name: "CONTROLLER | Locale"
  ansible.builtin.debug:
    var: gather_diagnostics_controller_locale.stdout_lines
  when: gather_diagnostics_controller_locale.stdout_lines is defined

- name: "CONTROLLER | Collections"
  ansible.builtin.debug:
    var: gather_diagnostics_controller_galaxy_list.stdout_lines
  when: gather_diagnostics_controller_galaxy_list.stdout_lines is defined

- name: "CONTROLLER | Environment"
  ansible.builtin.debug:
    var: gather_diagnostics_controller_env.stdout_lines
  when: gather_diagnostics_controller_env.stdout_lines is defined
  no_log: "{{ not gather_diagnostics_save_controller_log }}"

- name: "CONTROLLER | Core Facts"
  ansible.builtin.debug:
    var: gather_diagnostics_controller_setup_facts.ansible_facts
  when: gather_diagnostics_controller_setup_facts.ansible_facts is defined

# --- LOG FILE GENERATION ---

- name: "CONTROLLER | Consolidate all results into one variable"
  ansible.builtin.set_fact:
    gather_diagnostics_controller_results:
      ansible_version: "{{ gather_diagnostics_controller_ansible_version.stdout | default('N/A') }}"
      ssh_version: "{{ gather_diagnostics_controller_ssh_version.stderr | default('N/A') }}"
      ansible_config_all: "{{ gather_diagnostics_controller_ansible_config_dump.stdout_lines | default('N/A') }}"
      ansible_config_changed: "{{ gather_diagnostics_controller_ansible_config_changed.stdout_lines | default('N/A') }}"
      locale: "{{ gather_diagnostics_controller_locale.stdout_lines | default('N/A') }}"
      collections: "{{ gather_diagnostics_controller_galaxy_list.stdout_lines | default('N/A') }}"
      environment: "{{ gather_diagnostics_controller_env.stdout_lines | default('N/A') }}"
      controller_facts: "{{ gather_diagnostics_controller_setup_facts.ansible_facts | default('N/A') }}"
  no_log: "{{ not gather_diagnostics_save_controller_log }}"

- name: "CONTROLLER | Save controller node results to a YAML file"
  ansible.builtin.copy:
    dest: "{{ gather_diagnostics_output_dir }}/gather_diagnostics_report_controller.yml"
    content: "{{ gather_diagnostics_controller_results | to_nice_yaml }}"
    mode: '0644'
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  when: (gather_diagnostics_controller_results is defined) and gather_diagnostics_save_controller_log
