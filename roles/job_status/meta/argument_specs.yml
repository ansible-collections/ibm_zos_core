---
argument_specs:
  main:
    short_description: Query a job for status and execution state
    description:
      - >-
        The B(job_status) role queries a particular job with a given C(job_status_id) and parses the response
        to return the job status and whether the job is currently running.
    author:
      - Marcel Gutierrez (@AndreMarcel99)
    options:
      job_status_id:
        description:
          - The job ID assigned to the target job.
          - Format is C(STC), C(JOB), or C(TSU) followed by up to 5 digits, or C(S), C(J), or C(T) followed by 7 digits for IDs over 99,999.
          - Accepts the asterisk (C(*)) as a wildcard, but only retrieves job information from the first match.
        required: true
        type: str
