---
# Enable gathering control node diagnostics
gather_diagnostics_gather_control: true

# Enable gathering z/OS managed node diagnostics
gather_diagnostics_gather_managed_node: true

# Save control node diagnostics to file (vs console only)
gather_diagnostics_save_control_log: true

# Save managed node diagnostics to file (vs console only)
gather_diagnostics_save_managed_node_log: true

# Run operator commands for system activity and OMVS info (requires operator authority)
gather_diagnostics_gather_syslog: true

# Gather SSH configuration files from managed node (~/.ssh/rc, /etc/ssh/sshrc, /etc/ssh/ssh_config, /etc/ssh/sshd_config)
gather_diagnostics_gather_ssh_config: false

# Directory to write diagnostic reports
# In AAP: Uses artifacts directory (accessible via UI)
# Standalone: Uses control node's home directory
gather_diagnostics_output_dir: >-
  {{
    (playbook_dir + '/artifacts')
    if (lookup('env', 'TOWER_JOB_ID') | default('') != '' or
        lookup('env', 'CONTROLLER_JOB_ID') | default('') != '')
    else lookup('env', 'HOME')
  }}

# Environment variables for z/OS tasks (empty by default so that the test case and local host can take their own defined vars)
gather_diagnostics_environment_vars: {}
