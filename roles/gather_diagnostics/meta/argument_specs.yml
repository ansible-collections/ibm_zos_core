---
argument_specs:
  main:
    short_description: Gathers diagnostic facts from z/OS managed nodes and the Ansible controller
    description:
      - >-
        The B(gather_diagnostics) role gathers a comprehensive set of diagnostic facts from both the z/OS managed node
        and the Ansible controller node.
      - >-
        B(Managed Node (z/OS):) Gathers ZOAU version, Python version, locale, environment variables, user limits,
        pip packages, z/OS system facts, OMVS segment, filesystem mount status, ZOAU APF attributes, and optionally
        SSH configuration files and operator command output.
      - >-
        B(Controller Node:) Gathers Ansible version, SSH version, Ansible config, locale, installed collections,
        environment, and system facts.
      - >-
        This role can create separate YAML report files for the z/OS node
        (C(gather_diagnostics_report_managed_node_<hostname>.yml)) and the controller node
        (C(gather_diagnostics_report_controller.yml)) in the specified output directory.
      - >-
        Facts are also set on the respective hosts: C(gather_diagnostics_managed_results) on the z/OS host and
        C(gather_diagnostics_controller_results) on localhost.

    author:
      - Rohitash Goyal (@Rohitcodes28)
      - Ketan Kelkar (@ketankelkar)

    options:
      gather_diagnostics_gather_controller:
        description:
          - Controls whether the role will gather diagnostic facts from the Ansible controller node.
        type: bool
        required: false
        default: true

      gather_diagnostics_gather_managed_node:
        description:
          - Controls whether the role will gather diagnostic facts from the z/OS managed node.
        type: bool
        required: false
        default: true

      gather_diagnostics_save_controller_log:
        description:
          - >-
            Controls whether the role creates a YAML report file for the controller node and hides sensitive data
            (C(no_log{{':'}} true)) from the console for controller tasks.
        type: bool
        required: false
        default: true

      gather_diagnostics_save_managed_node_log:
        description:
          - >-
            Controls whether the role creates a YAML report file for the z/OS managed node and hides sensitive data
            (C(no_log{{':'}} true)) from the console for z/OS tasks.
        type: bool
        required: false
        default: true

      gather_diagnostics_gather_syslog:
        description:
          - >-
            Controls whether the role attempts to run authorized MVS operator commands (C(D A,L), C(D OMVS,LIMITS),
            C(D OMVS,OPTIONS)) to gather system activity.
          - Requires operator authority.
        type: bool
        required: false
        default: true

      gather_diagnostics_gather_ssh_config:
        description:
          - >-
            Controls whether to gather contents of ~/.ssh/rc, /etc/ssh/sshrc, /etc/ssh/ssh_config, and
            /etc/ssh/sshd_config from the z/OS managed node.
          - Disabled by default to avoid exposing sensitive security configurations.
        type: bool
        required: false
        default: false

      gather_diagnostics_output_dir:
        description:
          - Directory where diagnostic report files will be created.
          - In AAP, defaults to the artifacts directory. In standalone mode, defaults to the controller's home directory.
        type: str
        required: false

      gather_diagnostics_environment_vars:
        description:
          - Dictionary of environment variables to set for z/OS tasks.
          - Empty by default to allow test cases and playbooks to define their own.
        type: dict
        required: false
        default: {}
