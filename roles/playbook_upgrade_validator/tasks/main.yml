---
- name: Set Python path from ansible_playbook_python when available
  ansible.builtin.set_fact:
    python_path: "{{ ansible_playbook_python }}"
  when: ansible_playbook_python is defined

- name: Fallback to which python3 when ansible_playbook_python is unavailable
  ansible.builtin.raw: /usr/bin/which python3
  delegate_to: localhost
  register: python_path_lookup
  ignore_errors: true
  changed_when: false
  when: python_path is not defined

- name: Normalize Python path from lookup result
  ansible.builtin.set_fact:
    python_path: "{{ python_path | default((python_path_lookup.stdout | default('')) | trim) }}"
  when:
    - python_path is not defined
    - python_path_lookup is defined

- name: Fail when control node Python cannot be resolved
  ansible.builtin.fail:
    msg: >-
      Unable to determine a Python interpreter for the control node for the
      playbook_upgrade_validator role. Ensure ansible_playbook_python is
      available or that python3 is present in PATH on localhost.
  when:
    - python_path is not defined or not python_path

- name: Load migration changes from JSON file
  ansible.builtin.set_fact:
    data: "{{ lookup('file', 'dependency_config.json') | from_json }}"
  delegate_to: localhost

- name: Create logs directory when output_path is not defined
  ansible.builtin.file:
    path: "{{ playbook_dir }}/logs"
    state: directory
    mode: '0755'
  when: output_path is not defined

- name: Set output_path variable if it was not defined
  ansible.builtin.set_fact:
    output_path: "{{ playbook_dir }}/logs/migration_report.json"
  when: output_path is not defined

- name: Set ignore_response_params variable if it was not defined
  ansible.builtin.set_fact:
    ignore_response_params: false
  when: ignore_response_params is not defined

- name: Run playbook upgrade validator to list migration changes
  ansible.builtin.command:
    cmd: >
      "{{ python_path }}" "{{ role_path }}/files/playbook_upgrade_validator.py"
      --playbook_path "{{ playbook_path }}"
      --output_path "{{ output_path }}"
      {% if ignore_response_params %}
      --ignore_response_params
      {% endif %}
      --migration_map '{{ data | to_json }}'
  register: result
  delegate_to: localhost
  changed_when: false

- name: Print path where validation results are stored
  ansible.builtin.debug:
    msg: "Results saved to file: {{ output_path }}"
  delegate_to: localhost
