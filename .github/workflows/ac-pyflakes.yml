name: Pyflakes Lint

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  pyflakes:
    name: Run pyflakes on plugins/
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pyflakes
        run: pip install pyflakes

      - name: Run pyflakes on plugins/
        run: python -m pyflakes plugins/
