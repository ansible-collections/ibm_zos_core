---
argument_specs:
  main:
    short_description: Query a job to extract its current status and determine its execution state.
    description:
      - >-
        The B(job_status) role queries a particular job with a given job_id and parses the response
        to return the job status and whether the job is currently running.
      - >-
        The role tolerates the asterisk (C(*)) as wildcard but only retrieves information from
        the first job returned that matches the pattern.
    author:
      - Marcel Gutierrez (@AndreMarcel99)
    options:
      job_id:
        description:
          - The job id that has been assigned to the job.
          - A job id must begin with C(STC), C(JOB), C(TSU) and are followed by up to 5 digits.
          - When a job id is greater than 99,999, the job id format will begin with C(S), C(J), C(T) and are followed by 7 digits.
        required: true
        type: str
